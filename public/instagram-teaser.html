<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Responda — Instagram Post</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; background: #3d0408; }

  .post {
    width: 1080px;
    height: 1080px;
    background: #3d0408;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 80px;
    font-family: 'Atkinson Hyperlegible', Georgia, serif;
    position: relative;
    overflow: hidden;
  }

  /* Hintergrund-Textur: großes Logo */
  .bg-logo {
    position: absolute;
    bottom: -80px;
    right: -80px;
    width: 700px;
    height: 700px;
    opacity: 0.06;
    pointer-events: none;
    user-select: none;
  }

  /* Diagonale Akzentlinie */
  .accent-line {
    position: absolute;
    top: 0;
    left: 200px;
    width: 1px;
    height: 100%;
    background: rgba(253, 232, 216, 0.08);
    transform: rotate(12deg);
    transform-origin: top left;
  }

  /* Header: Logo + Label */
  .header {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo-circle {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: rgba(253, 232, 216, 0.12);
    border: 1px solid rgba(253, 232, 216, 0.25);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-circle img {
    width: 36px;
    height: 36px;
    object-fit: contain;
  }
  .brand {
    display: flex;
    flex-direction: column;
  }
  .brand-name {
    font-size: 18px;
    font-weight: 700;
    color: #fde8d8;
    letter-spacing: 0.02em;
  }
  .brand-sub {
    font-size: 11px;
    font-style: italic;
    color: rgba(253, 232, 216, 0.5);
    letter-spacing: 0.04em;
    margin-top: 1px;
  }

  /* Hauptinhalt */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 0;
  }

  .eyebrow {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: rgba(253, 232, 216, 0.45);
    margin-bottom: 28px;
  }

  .headline {
    font-size: 96px;
    font-weight: 800;
    font-style: italic;
    color: #fde8d8;
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin-bottom: 40px;
  }
  .headline em {
    color: rgba(253, 232, 216, 0.35);
    font-style: italic;
  }

  .divider {
    width: 64px;
    height: 2px;
    background: rgba(253, 232, 216, 0.3);
    margin-bottom: 36px;
  }

  .subtext {
    font-size: 22px;
    font-style: italic;
    color: rgba(253, 232, 216, 0.65);
    line-height: 1.45;
    max-width: 520px;
    font-weight: 400;
  }

  /* Features-Zeile */
  .features {
    display: flex;
    gap: 32px;
    margin-top: 56px;
  }
  .feature {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .feature-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: rgba(253, 232, 216, 0.4);
  }
  .feature-value {
    font-size: 15px;
    font-weight: 700;
    color: rgba(253, 232, 216, 0.8);
  }

  /* Footer */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .url {
    font-size: 14px;
    font-style: italic;
    color: rgba(253, 232, 216, 0.35);
    letter-spacing: 0.02em;
  }
  .tag {
    font-size: 13px;
    font-style: italic;
    font-weight: 700;
    color: rgba(253, 232, 216, 0.3);
    letter-spacing: 0.01em;
  }
</style>
</head>
<body>
<div class="post">

  <!-- Dekor -->
  <img src="logo.svg" class="bg-logo" alt="">
  <div class="accent-line"></div>

  <!-- Header -->
  <div class="header">
    <div class="logo-circle">
      <img src="logo.svg" alt="Responda">
    </div>
    <div class="brand">
      <div class="brand-name">Responda</div>
      <div class="brand-sub">Digitale Einsatzverwaltung</div>
    </div>
  </div>

  <!-- Hauptinhalt -->
  <div class="main">
    <div class="eyebrow">Coming Soon</div>
    <div class="headline">
      Bald<br/>
      <em>ist es</em><br/>
      so weit.
    </div>
    <div class="divider"></div>
    <div class="subtext">
      Einsätze, Patientenprotokolle, Lager und Ausbildungen — digital, sicher und von überall.
    </div>
    <div class="features">
      <div class="feature">
        <div class="feature-label">Für</div>
        <div class="feature-value">Feuerwehr</div>
      </div>
      <div class="feature">
        <div class="feature-label">&amp;</div>
        <div class="feature-value" style="color: rgba(253,232,216,0.5)">·</div>
      </div>
      <div class="feature">
        <div class="feature-label">Für</div>
        <div class="feature-value">Rettungsdienst</div>
      </div>
      <div class="feature">
        <div class="feature-label">&amp;</div>
        <div class="feature-value" style="color: rgba(253,232,216,0.5)">·</div>
      </div>
      <div class="feature">
        <div class="feature-label">Für</div>
        <div class="feature-value">Hilfsorganisationen</div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="url">responda.systems</div>
    <div class="tag">#Responda #Feuerwehr #Rettungsdienst</div>
  </div>

</div>
</body>
</html>
